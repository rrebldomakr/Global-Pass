<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Pulse | Weather & News</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="search-container">
        <input type="text" id="city-input" placeholder="Search City (e.g. Tokyo)...">
        <button onclick="getWeather()">Search</button>
    </div>

    <main id="weather-display" class="hidden">
        <div class="weather-card">
            <h1 id="city-name">City Name</h1>
            <p id="description">Weather Description</p>
            <div class="temp-big" id="temp">--°C</div>
            <div class="details">
                <span>Humidity: <b id="humidity">--%</b></span>
                <span>Wind: <b id="wind">-- km/h</b></span>
            </div>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
